name: running-python-script
on: 
  workflow_dispatch:
   inputs:
      list_items:
        description: 'Enter numbers (comma-separated)'
        required: true
        default: '10,20,30,15,20,25,26'

jobs:
  clone-repo:
    runs-on: ubuntu-latest
    steps:
    - name: using git repository cloning actions..
      uses: actions/checkout@v4

    - name: list all files
      run: |
        echo "listing files and folders.."
        ls -la
        echo "repo sucessfully clone4d.."
        
  run-python-script:
    runs-on: ubuntu-latest
    needs: clone-repo
    steps:
      - name: using git repository cloning actions..
        uses: actions/checkout@v4
      - name: check python version..
        run: python3 --version
      - name: running-script
        run: |
          echo "Current directory:"
          pwd
          ls -la
          cd app/
          ls 
          chmod +x prime-number.py
          ./prime-number.py "${{ github.event.inputs.list_items }}"
    
